<!DOCTYPE html>
<html>
<head>
  <title>Marketplace FakhrizMC</title>

  <style>
    body {
      background: rgb(20, 0, 0);
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
      text-shadow: 0 0 10px red;
    }

    .topbar {
      text-align: center;
      margin-bottom: 15px;
    }

    button {
      background: red;
      color: white;
      padding: 8px 12px;
      margin: 3px;
      border: none;
      border-radius: 6px;
    }

    button:hover {
      transform: scale(1.05);
    }

    .card {
      background: rgb(40, 0, 0);
      padding: 15px;
      margin: 15px auto;
      border-radius: 12px;
      max-width: 400px;
      box-shadow: 0 0 15px rgba(255,0,0,0.3);
      text-align: center;
      opacity: 0.7;
    }

    .placeholder {
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<h1>🔥 Marketplace</h1>

<div class="topbar">
  <button>All</button>
  <button>Addon</button>
  <button>Map</button>
  <button>Shader</button>
  <button>Texture</button>
</div>

<p class="placeholder">Loading marketplace content...</p>

<div class="card">
  <h2>Empty Slot</h2>
  <p class="placeholder">No content yet</p>
</div>

<div class="card">
  <h2>Empty Slot</h2>
  <p class="placeholder">Coming soon</p>
</div>

<div class="card">
  <h2>Empty Slot</h2>
  <p class="placeholder">Waiting for upload</p>
</div>

</body>
</html>
